{% extends "base.html" %}

{% block title %}Choose New Password | Jay's Gaming{% endblock title %}

{% block content %}
  <section class="form-shell auth-shell">
    <div class="form-panel">
      <p class="filter-label">New password</p>
      <h1 class="section-title mb-3">Set a new password.</h1>
      <form method="post" class="row g-3">
        {% csrf_token %}
        {% for field in form %}
          <div class="col-12">
            <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {% for error in field.errors %}
              <div class="field-error">{{ error }}</div>
            {% endfor %}
          </div>
        {% endfor %}
        <div class="col-12 d-grid">
          <button type="submit" class="btn btn-arcade btn-lg">Save Password</button>
        </div>
      </form>
    </div>
  </section>
{% endblock content %}
