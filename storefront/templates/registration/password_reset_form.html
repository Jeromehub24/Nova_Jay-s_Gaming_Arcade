{% extends "base.html" %}

{% block title %}Password Reset | Jay's Gaming{% endblock title %}

{% block content %}
  <section class="form-shell auth-shell">
    <div class="form-panel">
      <p class="filter-label">Password reset</p>
      <h1 class="section-title mb-3">Send yourself a reset link.</h1>
      <form method="post" class="row g-3">
        {% csrf_token %}
        {% for field in form %}
          <div class="col-12">
            <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
          </div>
        {% endfor %}
        <div class="col-12 d-grid">
          <button type="submit" class="btn btn-arcade btn-lg">Send Reset Email</button>
        </div>
      </form>
    </div>
  </section>
{% endblock content %}
