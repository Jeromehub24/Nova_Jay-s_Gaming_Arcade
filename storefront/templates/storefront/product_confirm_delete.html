{% extends "base.html" %}

{% block title %}Delete Product | Jay's Gaming{% endblock title %}

{% block content %}
  <section class="form-shell">
    <div class="form-panel">
      <p class="filter-label">Delete product</p>
      <h1 class="section-title mb-3">Remove "{{ product.name }}"?</h1>
      <p class="subtle-copy">The listing disappears from the storefront once deleted.</p>
      <form method="post" class="d-flex flex-wrap gap-3 mt-4">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger btn-lg">Delete Product</button>
        <a href="{% url 'storefront:dashboard' %}" class="btn btn-outline-light btn-lg">Cancel</a>
      </form>
    </div>
  </section>
{% endblock content %}
