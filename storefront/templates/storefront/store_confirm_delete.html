{% extends "base.html" %}

{% block title %}Delete Store | Jay's Gaming{% endblock title %}

{% block content %}
  <section class="form-shell">
    <div class="form-panel">
      <p class="filter-label">Delete store</p>
      <h1 class="section-title mb-3">Remove "{{ store.name }}"?</h1>
      <p class="subtle-copy">This also removes the products attached to the store. Use this carefully.</p>
      <form method="post" class="d-flex flex-wrap gap-3 mt-4">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger btn-lg">Delete Store</button>
        <a href="{% url 'storefront:dashboard' %}" class="btn btn-outline-light btn-lg">Cancel</a>
      </form>
    </div>
  </section>
{% endblock content %}
